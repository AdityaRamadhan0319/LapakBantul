<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - LaPak Bantul</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F4F7FB;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: linear-gradient(135deg, #0B3A66, #145DA0);
      padding: 50px 24px 40px;
      border-radius: 0 0 35px 35px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }

    .header h1 { color: white; font-size: 28px; }
    .header p  { color: rgba(255,255,255,0.7); font-size: 15px; }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      margin-top: 30px;
    }

    .input-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 10px;
      color: #1F3B63;
    }

    .input-wrap { position: relative; }

    input[type=password], input[type=text] {
      width: 100%;
      padding: 16px 50px 16px 50px;
      border: none;
      border-radius: 18px;
      background: white;
      font-size: 15px;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    input:focus { box-shadow: 0 0 0 2px #145DA0; }

    .input-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
    }

    .toggle-pass {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      background: none;
      border: none;
    }

    button.submit {
      width: 100%;
      padding: 18px;
      background: #0B3A66;
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button.submit:hover    { background: #145DA0; }
    button.submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
    }

    .alert.error {
      background: #FFEBEE;
      border: 1px solid #EF9A9A;
      color: #C62828;
    }

    .success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 20px 0;
    }

    .success-icon {
      width: 120px; height: 120px;
      background: rgba(0,200,0,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
    }

    .success-view h2 { font-size: 26px; color: #0B3A66; }
    .success-view p  { color: grey; line-height: 1.6; }

    a.back-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #0B3A66;
      color: white;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🔐</div>
    <h1 id="headerTitle">Reset Password</h1>
    <p id="headerSub">Buat password baru untuk akun LaPak Bantul</p>
  </div>

  <div class="card">

    <div class="alert error" id="errorBox">
      ⚠️ <span id="errorMsg"></span>
    </div>

    <div id="formView">
      <div class="input-group">
        <label>Password Baru</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="newPass"
            placeholder="Masukkan password baru" />
          <button class="toggle-pass"
            onclick="togglePass('newPass', this)">👁️</button>
        </div>
      </div>

      <div class="input-group">
        <label>Konfirmasi Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirmPass"
            placeholder="Ulangi password baru" />
          <button class="toggle-pass"
            onclick="togglePass('confirmPass', this)">👁️</button>
        </div>
      </div>

      <button class="submit" id="submitBtn"
        onclick="resetPassword()">
        Simpan Password Baru
      </button>
    </div>

    <div class="success-view" id="successView">
      <div class="success-icon">✅</div>
      <h2>Berhasil!</h2>
      <p>Password kamu berhasil diubah.<br/>
         Silakan login dengan password baru.</p>
      <a class="back-btn" href="https://lapakbantul-7ce0b.web.app">
        Kembali ke Aplikasi
      </a>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyBsvD8kGtafl3feZEuuFFaAgrrhaZiE_Jc",
      authDomain:        "lapakbantul-7ce0b.firebaseapp.com",
      projectId:         "lapakbantul-7ce0b",
      storageBucket:     "lapakbantul-7ce0b.firebasestorage.app",
      messagingSenderId: "186440999752",
      appId:             "1:186440999752:web:f7092e492d5a7f4184497d",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params  = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');
    const mode    = params.get('mode');

    // Jika tidak ada oobCode → berarti redirect setelah sukses
    // Langsung tampilkan halaman sukses
    if (!oobCode || mode !== 'resetPassword') {
      document.getElementById('formView').style.display    = 'none';
      document.getElementById('successView').style.display = 'flex';
      document.getElementById('headerTitle').textContent   = 'Password Diubah';
      document.getElementById('headerSub').textContent     = 'Password berhasil diperbarui';
    }

    window.resetPassword = async function () {
      const newPass     = document.getElementById('newPass').value;
      const confirmPass = document.getElementById('confirmPass').value;

      document.getElementById('errorBox').style.display = 'none';

      if (newPass.length < 6) {
        showError('Password minimal 6 karakter.');
        return;
      }

      if (newPass !== confirmPass) {
        showError('Password tidak cocok.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled    = true;
      btn.textContent = 'Menyimpan...';

      try {
        await verifyPasswordResetCode(auth, oobCode);
        await confirmPasswordReset(auth, oobCode, newPass);

        document.getElementById('formView').style.display    = 'none';
        document.getElementById('successView').style.display = 'flex';
        document.getElementById('headerTitle').textContent   = 'Password Diubah';
        document.getElementById('headerSub').textContent     = 'Password berhasil diperbarui';

      } catch (e) {
        btn.disabled    = false;
        btn.textContent = 'Simpan Password Baru';
        if (e.code === 'auth/expired-action-code') {
          showError('Link sudah kadaluarsa. Minta reset password lagi.');
        } else if (e.code === 'auth/weak-password') {
          showError('Password terlalu lemah. Minimal 6 karakter.');
        } else {
          showError('Terjadi kesalahan. Coba lagi.');
        }
      }
    };

    window.togglePass = function (id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type      = 'text';
        btn.textContent = '🙈';
      } else {
        input.type      = 'password';
        btn.textContent = '👁️';
      }
    };

    function showError(msg) {
      const box = document.getElementById('errorBox');
      document.getElementById('errorMsg').textContent = msg;
      box.style.display = 'flex';
    }
  </script>

</body>
</html>
